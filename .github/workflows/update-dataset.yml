# Pipeline: descarga Sheets → commit dataset → check CSV → transform → build static viewer → release .db → logs en GitHub Pages
# Ver docs/arquitectura-datos-despliegue.md

name: Update dataset

on:
  schedule:
    - cron: "0 6 * * 1"   # cada lunes a las 06:00 UTC
  workflow_dispatch:

permissions:
  contents: write   # commit dataset/, crear release
  pages: write     # desplegar GitHub Pages
  id-token: write  # requerido por deploy-pages

jobs:
  pipeline:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create pipeline logs directory
        run: mkdir -p pipeline-logs

      # --- Paso 1: Python — download_and_build.py ---
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Python dependencies
        run: pip install -r pullAndBuild/requirements.txt

      - name: Download sheets & compute aggregates
        env:
          GOOGLE_CREDENTIALS_JSON: ${{ secrets.GOOGLE_CREDENTIALS_JSON }}
        run: |
          set -o pipefail
          python pullAndBuild/download_and_build.py 2>&1 | tee pipeline-logs/step1-download.log

      # --- Paso 2: Commit dataset/ ---
      - name: Commit dataset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dataset/
          git diff --staged --quiet && echo "No changes in dataset/" || (git commit -m "chore(data): update dataset from Google Sheets" && git push)

      # --- Paso 3: check:csv ---
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Install Node dependencies
        run: pnpm install
        working-directory: transform

      - name: Run CSV integrity checks
        run: |
          set -o pipefail
          pnpm run check:csv 2>&1 | tee "$GITHUB_WORKSPACE/pipeline-logs/step2-check-csv.log"
        working-directory: transform

      # --- Paso 4: transform ---
      - name: Transform CSVs to SQLite
        run: |
          set -o pipefail
          pnpm run transform 2>&1 | tee "$GITHUB_WORKSPACE/pipeline-logs/step3-transform.log"
        working-directory: transform

      # --- Paso 5: build:static-viewer ---
      - name: Build static viewer
        run: |
          set -o pipefail
          pnpm run build:static-viewer 2>&1 | tee "$GITHUB_WORKSPACE/pipeline-logs/step4-build-static-viewer.log"
        working-directory: transform

      # --- Paso 6: Release output/ (tag latest-data) ---
      - name: Create/update release (tag latest-data)
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest-data
          name: "Latest dataset"
          files: output/diputacion_tarragona.db
          replace_assets: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # --- Paso 7: Siempre — generar pipeline-logs.html ---
      - name: Generate pipeline logs page
        if: always() && !cancelled()
        run: |
          REPORT_DIR="docs/csv-integrity"
          mkdir -p "$REPORT_DIR"
          TIMESTAMP=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          ESCAPE='s/&/\&amp;/g; s/</\&lt;/g; s/>/\&gt;/g'
          {
            echo "<!doctype html>"
            echo "<html lang=\"en\"><head><meta charset=\"utf-8\"><title>Pipeline logs</title>"
            echo "<style>body{font-family:system-ui,sans-serif;padding:1.5rem;max-width:960px;margin:0 auto;background:#f6f6f6;} h1{margin-bottom:0.25rem;} .log{background:#fff;border-radius:8px;padding:1rem;overflow:auto;white-space:pre-wrap;font-size:0.85rem;} footer{margin-top:1rem;font-size:0.75rem;color:#6b7280;}</style></head><body>"
            echo "<h1>Pipeline logs</h1>"
            echo "<p>Última ejecución: $TIMESTAMP</p>"
            echo "<p><a href=\"index.html\">Volver al reporte de integridad CSV</a></p>"
            echo "<div class=\"log\"><pre>"
            for f in pipeline-logs/step1-download.log pipeline-logs/step2-check-csv.log pipeline-logs/step3-transform.log pipeline-logs/step4-build-static-viewer.log; do
              if [ -f "$f" ]; then
                echo ""
                echo "========== $f =========="
                sed "$ESCAPE" "$f" || true
              fi
            done
            echo "</pre></div>"
            echo "<footer>Generated by update-dataset workflow.</footer></body></html>"
          } > "$REPORT_DIR/pipeline-logs.html"

      # --- Paso 8: Subir reporte y logs como artifact descargable (sin commit) ---
      - name: Upload report and logs artifact
        if: always() && !cancelled()
        uses: actions/upload-artifact@v4
        with:
          name: csv-integrity-report
          path: |
            docs/csv-integrity
            pipeline-logs

      # --- Paso 9: Subir artifact para GitHub Pages ---
      - name: Upload GitHub Pages artifact
        if: always() && !cancelled()
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  deploy:
    if: always() && (needs.pipeline.result == 'success' || needs.pipeline.result == 'failure')
    needs: pipeline
    runs-on: ubuntu-latest
    environment: github-pages
    steps:
      - name: Deploy to GitHub Pages
        uses: actions/deploy-pages@v4
